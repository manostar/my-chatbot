<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせチャット</title>

<style>
body{
font-family:sans-serif;
background:#f5f7fb;
}

#chatLauncher{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:#0f766e;
color:white;
font-size:26px;
cursor:pointer;
}

#chatWindow{
position:fixed;
right:20px;
bottom:90px;
width:360px;
height:520px;
background:white;
border:1px solid #ccc;
border-radius:12px;
display:none;
flex-direction:column;
overflow:hidden;
}

#chatHeader{
background:#0f766e;
color:white;
padding:12px;
font-weight:bold;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
background:#f8fafc;
}

.msg{
margin:8px 0;
line-height:1.6;
}

.user{
text-align:right;
color:#0369a1;
}

.bot{
color:#111;
}

#inputArea{
display:flex;
border-top:1px solid #ddd;
}

#questionInput{
flex:1;
padding:10px;
border:none;
font-size:14px;
}

#sendBtn{
width:70px;
border:none;
background:#0f766e;
color:white;
cursor:pointer;
}

#quick{
padding:8px;
border-top:1px solid #eee;
}

.chip{
margin:4px;
padding:6px 10px;
border:1px solid #ccc;
border-radius:20px;
background:white;
cursor:pointer;
font-size:12px;
}
</style>
</head>

<body>

<button id="chatLauncher" onclick="toggleChat()">💬</button>

<div id="chatWindow">

<div id="chatHeader">
お問い合わせチャット
</div>

<div id="messages"></div>

<div id="quick">
<button class="chip" onclick="quickAsk('会社概要')">会社概要</button>
<button class="chip" onclick="quickAsk('取扱製品')">取扱製品</button>
<button class="chip" onclick="quickAsk('製品システム')">製品システム</button>
<button class="chip" onclick="quickAsk('所在地')">所在地</button>
<button class="chip" onclick="quickAsk('お問い合わせ')">お問い合わせ</button>
</div>

<div id="inputArea">
<input id="questionInput" placeholder="ご質問を入力してください">
<button id="sendBtn" onclick="ask()">送信</button>
</div>

</div>

<script src="site-data.js"></script>

<script>

function toggleChat(){
const box=document.getElementById("chatWindow");
box.style.display = box.style.display==="flex" ? "none" : "flex";
}

function add(text,type){
const m=document.getElementById("messages");
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
m.appendChild(div);
m.scrollTop=m.scrollHeight;
}

function ask(){

const input=document.getElementById("questionInput");
const q=input.value.trim();

if(!q)return;

add(q,"user");

let found=null;

for(let i=0;i<siteData.length;i++){
if(q.includes(siteData[i].title.replace("システム",""))){
found=siteData[i];
break;
}
}

if(found){

let html="<strong>"+found.title+"</strong><br>";
html+=found.content+"<br><br>";
html+="<a href='"+found.url+"' target='_blank'>詳しくはこちら</a>";

add(html,"bot");

}else{

add("該当情報が見つかりませんでした。<br><a href='https://powered.co.jp/contact/' target='_blank'>お問い合わせページはこちら</a>","bot");

}

input.value="";
}

function quickAsk(text){
document.getElementById("questionInput").value=text;
ask();
}

document.getElementById("questionInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){ask();}
});

add("こんにちは。日本パワード工業株式会社のホームページ内容からご案内します。会社概要、製品、所在地などを質問してください。","bot");

</script>

</body>
</html>
