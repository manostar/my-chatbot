<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Powered お問い合わせチャット</title>

<style>

body{
font-family:sans-serif;
margin:0;
}

#chatButton{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:#0f766e;
color:white;
font-size:24px;
border:none;
cursor:pointer;
}

#chatBox{
position:fixed;
right:20px;
bottom:90px;
width:350px;
height:500px;
background:white;
border:1px solid #ccc;
display:none;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin-bottom:10px;
}

#inputArea{
display:flex;
gap:5px;
padding:10px;
}

</style>

</head>

<body>

<button id="chatButton" onclick="toggleChat()">💬</button>

<div id="chatBox">

<div id="messages"></div>

<div id="inputArea">
<input id="q" placeholder="質問を入力してください">
<button onclick="ask()">送信</button>
</div>

</div>

<script src="site-data.js"></script>

<script>

function toggleChat(){
let box=document.getElementById("chatBox")

if(box.style.display=="flex")
box.style.display="none"
else
box.style.display="flex"
}

function add(text){
let d=document.createElement("div")
d.className="msg"
d.innerHTML=text
messages.appendChild(d)
}

function search(q){

q=q.toLowerCase()

for(let item of siteData){

let text=(item.title+item.content).toLowerCase()

if(text.includes(q))
return item

}

return null
}

function ask(){

let q=document.getElementById("q").value

add("あなた: "+q)

let r=search(q)

if(r){

add("BOT: <b>"+r.title+"</b><br>"+r.content+"<br><a href='"+r.url+"' target='_blank'>詳しくはこちら</a>")

}else{

add("BOT: 該当情報が見つかりませんでした。<br><a href='https://powered.co.jp/contact/' target='_blank'>お問い合わせはこちら</a>")

}

}

</script>

</body>
</html>
