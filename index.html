<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせチャット</title>
<style>
body{
  font-family:sans-serif;
  background:#f5f7fb;
  margin:0;
}

#chatLauncher{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#0f766e;
  color:white;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  z-index:1000;
}

#chatWindow{
  position:fixed;
  right:20px;
  bottom:90px;
  width:380px;
  height:580px;
  background:white;
  border:1px solid #ccc;
  border-radius:12px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 12px 24px rgba(0,0,0,0.12);
  z-index:999;
}

#chatHeader{
  background:#0f766e;
  color:white;
  padding:12px;
  font-weight:bold;
}

#chatSub{
  font-size:12px;
  opacity:0.9;
  margin-top:4px;
  font-weight:normal;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
  background:#f8fafc;
}

.msg{
  margin:8px 0;
  line-height:1.65;
  padding:10px 12px;
  border-radius:10px;
  max-width:92%;
  word-break:break-word;
  white-space:normal;
}

.user{
  margin-left:auto;
  background:#dbeafe;
  color:#0f172a;
}

.bot{
  background:white;
  border:1px solid #e5e7eb;
  color:#111827;
}

#quick{
  padding:8px;
  border-top:1px solid #eee;
  background:#fff;
}

.quickLabel{
  font-size:12px;
  color:#6b7280;
  margin-bottom:6px;
}

.chip{
  margin:4px 4px 0 0;
  padding:6px 10px;
  border:1px solid #ccc;
  border-radius:20px;
  background:white;
  cursor:pointer;
  font-size:12px;
}

.chip:hover{
  background:#f0fdfa;
}

#inputArea{
  display:flex;
  border-top:1px solid #ddd;
  background:#fff;
  padding:8px;
  gap:8px;
}

#questionInput{
  flex:1;
  padding:10px 12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  font-size:14px;
  outline:none;
}

#questionInput:focus{
  border-color:#0f766e;
}

#sendBtn{
  width:70px;
  border:none;
  background:#0f766e;
  color:white;
  cursor:pointer;
  border-radius:10px;
}

#sendBtn:hover{
  background:#0b5f58;
}

.smallNote{
  padding:0 10px 10px;
  font-size:11px;
  color:#6b7280;
  background:#fff;
}

.resultTitle{
  font-weight:bold;
  display:block;
  margin-bottom:4px;
}

.resultSection{
  color:#6b7280;
  font-size:12px;
  margin-top:10px;
  margin-bottom:4px;
}

a{
  color:#0f766e;
  font-weight:bold;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

@media (max-width: 480px){
  #chatWindow{
    right:10px;
    bottom:82px;
    width:calc(100vw - 20px);
    height:calc(100vh - 110px);
  }

  #chatLauncher{
    right:10px;
    bottom:10px;
  }
}
</style>
</head>
<body>

<button id="chatLauncher" onclick="toggleChat()">💬</button>

<div id="chatWindow">

  <div id="chatHeader">
    お問い合わせチャット
    <div id="chatSub">ホームページの内容からご案内します</div>
  </div>

  <div id="messages"></div>

  <div id="quick">
    <div class="quickLabel">よくある質問</div>
    <button class="chip" onclick="quickAsk('会社概要')">会社概要</button>
    <button class="chip" onclick="quickAsk('取扱製品')">取扱製品</button>
    <button class="chip" onclick="quickAsk('製品システム')">製品システム</button>
    <button class="chip" onclick="quickAsk('所在地')">所在地</button>
    <button class="chip" onclick="quickAsk('お問い合わせ')">お問い合わせ</button>
  </div>

  <div id="inputArea">
    <input id="questionInput" placeholder="ご質問を入力してください">
    <button id="sendBtn" onclick="ask()">送信</button>
  </div>

  <div class="smallNote">自然文で質問できます。例: シリコーンの充填設備はありますか？ / 本社はどこですか？ / 電話番号を知りたい</div>

</div>

<script src="site-data.js"></script>

<script>
const synonymGroups = [
  ["会社", "企業", "メーカー", "社名", "概要", "どんな会社", "事業内容"],
  ["製品", "商品", "ラインナップ", "機器", "装置"],
  ["システム", "設備", "塗布", "充填", "定量吐出", "供給"],
  ["所在地", "住所", "本社", "アクセス", "場所", "どこ", "拠点"],
  ["問い合わせ", "問合せ", "連絡", "電話", "相談", "フォーム", "メール"],
  ["受付時間", "営業時間", "何時", "営業", "受付"],
  ["ポンプ", "圧送", "レシプロ", "ドラム", "ペール", "高圧圧送"],
  ["バルブ", "ガン", "吐出", "ディスペンサー"],
  ["強み", "特長", "特徴", "提案力", "技術力"],
  ["業界", "用途", "分野", "使われる"],
  ["シリコーン", "シリコン", "LSR", "LIM", "液状シリコーンゴム"],
  ["インキ", "印刷", "輪転機"],
  ["グリース", "接着剤", "シール剤", "FIPG", "放熱コンパウンド"],
  ["会社概要", "代表取締役", "資本金", "設立"],
  ["お問い合わせ", "電話番号", "受付時間", "資料請求", "技術相談"],
  ["所在地", "東京都", "品川区", "西五反田", "山梨県", "鳴沢村"],
  ["取引先", "納入先", "採用実績", "取引先企業"],
  ["FAX", "ファックス"]
];

const questionPatterns = [
  { keywords: ["電話"], targets: ["お問い合わせ", "本社連絡先", "富士テクニカルセンター連絡先"] },
  { keywords: ["電話番号"], targets: ["お問い合わせ", "本社連絡先", "富士テクニカルセンター連絡先"] },
  { keywords: ["受付", "時間"], targets: ["お問い合わせ"] },
  { keywords: ["営業時間"], targets: ["お問い合わせ"] },
  { keywords: ["住所"], targets: ["所在地"] },
  { keywords: ["所在地"], targets: ["所在地"] },
  { keywords: ["本社"], targets: ["所在地", "本社連絡先"] },
  { keywords: ["会社"], targets: ["会社概要", "事業内容", "私たちの強み"] },
  { keywords: ["どんな", "会社"], targets: ["会社概要", "事業内容"] },
  { keywords: ["製品"], targets: ["製品ラインナップ", "ポンプカテゴリ", "ミニエックスポンプ", "ペールポンプ", "ドラムポンプ", "ガン・バルブ"] },
  { keywords: ["ポンプ"], targets: ["ポンプカテゴリ", "ミニエックスポンプ", "カートリッジ用高圧圧送ポンプ", "ペールポンプ", "ドラムポンプ"] },
  { keywords: ["ガン"], targets: ["ガン・バルブ"] },
  { keywords: ["バルブ"], targets: ["ガン・バルブ"] },
  { keywords: ["塗布"], targets: ["塗布システム", "製品システム"] },
  { keywords: ["充填"], targets: ["充填システム", "製品システム"] },
  { keywords: ["LSR"], targets: ["2液・3液の定量吐出"] },
  { keywords: ["LIM"], targets: ["2液・3液の定量吐出"] },
  { keywords: ["シリコーン"], targets: ["充填システム", "2液・3液の定量吐出"] },
  { keywords: ["シリコン"], targets: ["充填システム", "2液・3液の定量吐出"] },
  { keywords: ["インキ"], targets: ["インキ供給設備"] },
  { keywords: ["取引先"], targets: ["取引先企業"] },
  { keywords: ["業界"], targets: ["対応業界"] },
  { keywords: ["強み"], targets: ["私たちの強み"] },
  { keywords: ["FAX"], targets: ["本社連絡先", "富士テクニカルセンター連絡先"] },
  { keywords: ["ファックス"], targets: ["本社連絡先", "富士テクニカルセンター連絡先"] }
];

function toggleChat(){
  const box = document.getElementById("chatWindow");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
  if(box.style.display === "flex"){
    document.getElementById("questionInput").focus();
  }
}

function add(text,type){
  const m = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  m.appendChild(div);
  m.scrollTop = m.scrollHeight;
}

function normalize(text){
  return (text || "")
    .toLowerCase()
    .replace(/[\s　]+/g,"")
    .replace(/[?？!！。、,.・:：()/]/g,"");
}

function katakanaToHiragana(str){
  return str.replace(/[ァ-ヶ]/g, function(ch){
    return String.fromCharCode(ch.charCodeAt(0) - 0x60);
  });
}

function normalizeJa(text){
  return katakanaToHiragana(normalize(text));
}

function expandQuery(text){
  const query = text.trim();
  const tokens = new Set();
  const base = query.split(/[\s　]+/).filter(Boolean);

  base.forEach(function(t){
    tokens.add(t);
  });

  synonymGroups.forEach(function(group){
    const hit = group.some(function(word){
      return query.includes(word);
    });
    if(hit){
      group.forEach(function(word){
        tokens.add(word);
      });
    }
  });

  for(let i = 0; i < query.length; i++){
    for(let j = i + 2; j <= Math.min(query.length, i + 8); j++){
      const part = query.slice(i, j).trim();
      if(part.length >= 2){
        tokens.add(part);
      }
    }
  }

  return Array.from(tokens);
}

function similarity(a,b){
  const aa = normalizeJa(a);
  const bb = normalizeJa(b);
  let score = 0;

  if(!aa || !bb) return 0;

  for(let n = 2; n <= 4; n++){
    for(let i = 0; i <= aa.length - n; i++){
      const part = aa.substring(i, i + n);
      if(part.length >= 2 && bb.includes(part)){
        score += n;
      }
    }
  }

  return score;
}

function countTokenHits(tokens, text){
  const normalizedText = normalizeJa(text);
  let hits = 0;

  tokens.forEach(function(token){
    const t = normalizeJa(token);
    if(t.length >= 2 && normalizedText.includes(t)){
      hits++;
    }
  });

  return hits;
}

function escapeHtml(text){
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function scoreItem(question, item){
  const q = normalizeJa(question);
  const title = item.title || "";
  const content = item.content || "";
  const text = title + " " + content;
  const nTitle = normalizeJa(title);
  const nText = normalizeJa(text);
  const tokens = expandQuery(question);

  let score = 0;

  if(q && nTitle.includes(q)) score += 80;
  if(q && nText.includes(q)) score += 35;

  score += similarity(question, title) * 3;
  score += similarity(question, text);

  const titleTokenHits = countTokenHits(tokens, title);
  const contentTokenHits = countTokenHits(tokens, content);

  score += titleTokenHits * 18;
  score += contentTokenHits * 7;

  if(Array.isArray(item.keywords)){
    item.keywords.forEach(function(keyword){
      const nk = normalizeJa(keyword);
      if(question.includes(keyword)) score += 25;
      if(q.includes(nk)) score += 18;
      if(nTitle.includes(nk)) score += 20;
      if(nText.includes(nk)) score += 10;
    });
  }

  questionPatterns.forEach(function(rule){
    const matched = rule.keywords.every(function(keyword){
      return question.includes(keyword);
    });
    if(matched){
      rule.targets.forEach(function(target){
        if(title.includes(target)){
          score += 40;
        }
      });
    }
  });

  if(question.includes("電話") && content.includes("03-3493-2037")) score += 30;
  if(question.includes("電話番号") && (content.includes("03-3493-2037") || content.includes("0555-85-3777"))) score += 40;
  if((question.includes("住所") || question.includes("どこ")) && content.includes("東京都")) score += 30;
  if((question.includes("シリコーン") || question.includes("シリコン")) && content.includes("シリコーン")) score += 30;
  if(question.includes("LSR") && (content.includes("LSR") || title.includes("定量吐出"))) score += 35;
  if(question.includes("LIM") && (content.includes("LIM") || title.includes("定量吐出"))) score += 35;
  if(question.includes("インキ") && (title.includes("インキ") || content.includes("インキ"))) score += 35;
  if(question.includes("グリース") && (content.includes("グリス") || content.includes("グリース"))) score += 25;
  if(question.includes("取引先") && title.includes("取引先")) score += 40;

  if(question.includes("所在地") || question.includes("住所") || question.includes("本社はどこ") || question.includes("どこ")){
    if(title === "所在地") score += 120;
    if(title === "本社連絡先") score += 40;
    if(title === "富士テクニカルセンター連絡先") score += 20;
    if(title === "会社概要") score -= 30;
  }

  if(question.includes("本社")){
    if(title === "所在地") score += 60;
    if(title === "本社連絡先") score += 80;
  }

  if(question.includes("富士テクニカルセンター")){
    if(title === "所在地") score += 60;
    if(title === "富士テクニカルセンター連絡先") score += 90;
  }

  if(question.includes("FAX") || question.includes("ファックス")){
    if(title === "本社連絡先" || title === "富士テクニカルセンター連絡先") score += 100;
    if(title === "会社概要") score -= 20;
  }

  if(title === "お問い合わせ") score += 2;
  if(title === "所在地") score += 2;

  return score;
}

function searchBest(question){
  return siteData
    .map(function(item){
      return {
        item: item,
        score: scoreItem(question, item)
      };
    })
    .filter(function(row){
      return row.score > 0;
    })
    .sort(function(a,b){
      return b.score - a.score;
    })
    .slice(0, 4);
}

function buildAnswer(question){
  const results = searchBest(question);

  if(results.length === 0){
    return "該当情報が見つかりませんでした。<br><a href='https://powered.co.jp/contact/' target='_blank' rel='noopener noreferrer'>お問い合わせページはこちら</a>";
  }

  const top = results[0].item;
  let html = "<span class='resultTitle'>" + escapeHtml(top.title) + "</span>";
  html += escapeHtml(top.content) + "<br><br>";
  html += "<a href='" + top.url + "' target='_blank' rel='noopener noreferrer'>詳しくはこちら</a>";

  if(results.length > 1){
    html += "<div class='resultSection'>関連情報</div>";
    for(let i = 1; i < results.length; i++){
      html += "・<a href='" + results[i].item.url + "' target='_blank' rel='noopener noreferrer'>" + escapeHtml(results[i].item.title) + "</a><br>";
    }
  }

  return html;
}

function ask(){
  const input = document.getElementById("questionInput");
  const q = input.value.trim();

  if(!q) return;

  add(escapeHtml(q), "user");
  add(buildAnswer(q), "bot");

  input.value = "";
  input.focus();
}

function quickAsk(text){
  document.getElementById("questionInput").value = text;
  ask();
}

document.getElementById("questionInput").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    ask();
  }
});

add(
  "こんにちは。日本パワード工業株式会社のホームページ内容からご案内します。<br>自然な文章で質問できます。たとえば「シリコーンの充填設備はありますか？」「本社の住所は？」「電話番号を知りたい」などと入力してください。",
  "bot"
);
</script>

</body>
</html>
